name: Validate

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-powershell-51:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Parse PowerShell files with Windows PowerShell 5.1
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $failed = $false
          Get-ChildItem -Recurse -File -Include *.ps1,*.psm1 | ForEach-Object {
            $tokens = $null
            $parseErrors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$parseErrors)
            if ($parseErrors) {
              foreach ($pe in $parseErrors) {
                Write-Error "$($_.FullName):$($pe.Extent.StartLineNumber): $($pe.Message)" -ErrorAction Continue
                $failed = $true
              }
            }
          }
          if ($failed) { throw 'PowerShell parser errors were found.' }

      - name: Run source-repository tests
        shell: powershell
        run: .\tests\Repository.Tests.ps1

  text-and-json:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate JSON and source-only payload policy
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          root = Path('.')
          for path in root.rglob('*.json'):
              json.loads(path.read_text(encoding='utf-8-sig'))
              print(f'valid json: {path}')

          blocked = {'.exe', '.efi', '.dll', '.sys', '.msi', '.zip', '.7z', '.rar'}
          offenders = [p for p in root.rglob('*') if p.is_file() and p.suffix.lower() in blocked]
          if offenders:
              raise SystemExit('Source repository contains blocked payloads: ' + ', '.join(map(str, offenders)))
          PY
